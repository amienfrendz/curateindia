<!DOCTYPE html>
<html><head><title>Mic Test</title></head>
<body style="font-family:sans-serif;padding:40px">
<h2>Speech Recognition Test</h2>
<button id="btn" style="padding:20px 40px;font-size:18px">🎤 Start</button>
<pre id="log" style="background:#eee;padding:20px;margin-top:20px;white-space:pre-wrap"></pre>
<script>
const log = document.getElementById('log');
const btn = document.getElementById('btn');
function l(msg) { log.textContent += msg + '\n'; console.log(msg); }

l('UserAgent: ' + navigator.userAgent);
l('SpeechRecognition: ' + !!window.SpeechRecognition);
l('webkitSpeechRecognition: ' + !!window.webkitSpeechRecognition);
l('Secure context: ' + window.isSecureContext);
l('Protocol: ' + location.protocol);

btn.onclick = async function() {
  l('\n--- Click ---');
  
  // Test mic permission
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    l('getUserMedia: OK');
    stream.getTracks().forEach(t => t.stop());
  } catch(e) {
    l('getUserMedia FAILED: ' + e.message);
    return;
  }
  
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { l('No SpeechRecognition API'); return; }
  
  const r = new SR();
  l('Created recognition object');
  l('processLocally prop exists: ' + ('processLocally' in r));
  
  // Test 1: processLocally=true, no lang (system default)
  l('\n=== Test 1: processLocally=true, no lang ===');
  const r1 = new SR();
  r1.processLocally = true;
  r1.interimResults = false;
  r1.continuous = false;
  r1.onresult = (e) => l('T1 result: "' + e.results[0][0].transcript + '"');
  r1.onerror = (e) => { l('T1 error: ' + e.error); tryTest2(); };
  r1.onend = () => l('T1 end');
  try { r1.start(); l('T1 start OK'); } catch(e) { l('T1 start THREW: ' + e.message); tryTest2(); }

  function tryTest2() {
    l('\n=== Test 2: processLocally=false (cloud), en-US ===');
    const r2 = new SR();
    r2.processLocally = false;
    r2.lang = 'en-US';
    r2.interimResults = false;
    r2.continuous = false;
    r2.onresult = (e) => l('T2 result: "' + e.results[0][0].transcript + '"');
    r2.onerror = (e) => { l('T2 error: ' + e.error); tryTest3(); };
    r2.onend = () => l('T2 end');
    try { r2.start(); l('T2 start OK'); } catch(e) { l('T2 start THREW: ' + e.message); tryTest3(); }
  }

  function tryTest3() {
    l('\n=== Test 3: no processLocally, no lang (bare minimum) ===');
    const r3 = new SR();
    r3.interimResults = false;
    r3.continuous = false;
    r3.onresult = (e) => l('T3 result: "' + e.results[0][0].transcript + '"');
    r3.onerror = (e) => l('T3 error: ' + e.error);
    r3.onend = () => l('T3 end');
    try { r3.start(); l('T3 start OK'); } catch(e) { l('T3 start THREW: ' + e.message); }
  }
};
</script>
</body></html>
